<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Vista | Support Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-wrapper">
    <header class="luxury-header">
        <a href="index.html" class="logo-area">
            <h1>Grand Vista</h1>
            <p>The Epitome of Luxury</p>
        </a>
        <nav class="nav-menu" id="navMenu">
            <a href="index.html" class="nav-item">Dashboard</a>
            <a href="rooms.html" class="nav-item">Accommodations</a>
            <a href="bookings.html" class="nav-item">Reservations</a>
            <a href="services.html" class="nav-item">Amenities</a>
            <a href="contact.html" class="nav-item active">Support</a>
        </nav>
        <div class="auth-widget" id="authWidget"></div>
        <button class="mobile-menu-toggle" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    </header>

    <main class="page-content">
        <div class="container">
            <div style="display:grid; grid-template-columns:1fr 1.5fr; gap:4rem; align-items:start">
                <div>
                    <h2 style="font-family:'Playfair Display'; font-size:3rem; color:var(--primary); margin-bottom:2rem">Support Hub</h2>
                    <div style="background:var(--bg-card); padding:2rem; border-radius:1.5rem; box-shadow:var(--shadow-md)">
                        <p style="margin-bottom:1.5rem"><strong>Address:</strong> Marina Drive, Mumbai</p>
                        <p style="margin-bottom:1.5rem"><strong>Phone:</strong> +91 22 4000 8888</p>
                        <iframe width="100%" height="250" style="border-radius:1rem; border:0" loading="lazy" src="https://maps.google.com/maps?q=Mumbai%20Marina%20Drive&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
                    </div>
                </div>
                <div style="background:var(--bg-card); padding:3rem; border-radius:2rem; box-shadow:var(--shadow-md)">
                    <h3 style="margin-bottom:2rem; color:var(--primary)">Quick Inquiry</h3>
                    <form id="contactFormMain">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com" required>
                        <label>Urgency</label>
                        <select><option>Standard</option><option>High Priority</option></select>
                        <label>Message</label>
                        <textarea rows="5" placeholder="How can we help?" required></textarea>
                        <button type="submit" class="btn-gold" style="width:100%">Submit Inquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2026 Grand Vista Hotel.</p></div>
        </div>
    </footer>
</div>
<script src="script.js"></script>
<script>
    document.getElementById("contactFormMain").onsubmit = (e) => {
        e.preventDefault();
        alert("✨ Inquiry submitted successfully!");
        e.target.reset();
    };
</script>
</body>
</html>
